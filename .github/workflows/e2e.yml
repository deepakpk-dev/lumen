name: Cross-browser E2E

# Runs the Playwright smoke suite on Chromium, Firefox, and WebKit. Triggers on
# pushes to main and on PRs targeting main, since work here often lands directly
# on main rather than only through PRs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the browser binaries (~175MB) so they only download when the
      # Playwright version changes, not on every run.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        # On a cache hit we only need the OS-level libraries the browsers link
        # against; otherwise download the browsers too.
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps
          else
            npx playwright install --with-deps
          fi

      - name: Build app
        run: npm run build

      - name: Run cross-browser smoke suite
        run: npm run test:e2e
        env:
          # Test against the production build (next start), not the dev server.
          PW_WEB_COMMAND: npm run start

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
